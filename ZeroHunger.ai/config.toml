title = "ZeroHunger.ai"
baseURL = "https://www.zerohunger.ai/"
languageCode = "en-us"
theme = "zerohunger"
resourceDir = "../resources"

DefaultContentLanguage = "en"
Paginate = 6
googleAnalytics = "G-YDRBDSQ6P9"
enableRobotsTXT = true

# Required for Hugo image processing in shortcodes
[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]

[languages]
  [languages.en]
    title = "ZeroHunger.ai"
    weight = 1
    contentDir = "content/en"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "A non-profit software & consulting business to accelerate your Impact!"

[[params.ananke_socials]]
  name = "github"
  url = "https://github.com/mmatiaschek"

[[params.ananke_socials]]
  name = "twitter"
  url = "https://twitter.com/mmatiaschek"

