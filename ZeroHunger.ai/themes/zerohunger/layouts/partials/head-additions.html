<!-- Cookie Consent Banner -->
<style>
  #zh-cookie-banner {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #zh-cookie-banner.zh-cookie--visible {
    display: flex;
  }
  .zh-cookie__box {
    background: #fff;
    border-radius: 1rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 480px;
    width: 100%;
    padding: 2rem;
  }
  .zh-cookie__title {
    font-size: 1.25rem;
    font-weight: 700;
    color: #111;
    margin: 0 0 0.75rem;
  }
  .zh-cookie__text {
    font-size: 0.95rem;
    color: #555;
    line-height: 1.5;
    margin: 0 0 1.5rem;
  }
  .zh-cookie__text a {
    color: var(--zh-blue, #357edd);
    text-decoration: underline;
  }
  .zh-cookie__actions {
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }
  .zh-cookie__accept {
    background: var(--zh-blue, #357edd);
    color: #fff;
    border: none;
    border-radius: 0.625rem;
    padding: 0.875rem 1.5rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .zh-cookie__accept:hover { background: var(--zh-blue-dark, #00449e); }
  .zh-cookie__decline {
    background: #f0f0f0;
    color: #444;
    border: none;
    border-radius: 0.625rem;
    padding: 0.75rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .zh-cookie__decline:hover { background: #e0e0e0; }
</style>

<div id="zh-cookie-banner" role="dialog" aria-modal="true" aria-label="Cookie consent">
  <div class="zh-cookie__box">
    <h3 class="zh-cookie__title">We value your privacy</h3>
    <p class="zh-cookie__text">
      We use cookies to understand how visitors use our site — this helps us improve ZeroHunger.ai
      and measure our impact. No advertising cookies. See our
      <a href="/privacy">Privacy Policy</a> for details.
    </p>
    <div class="zh-cookie__actions">
      <button class="zh-cookie__accept" onclick="zhAcceptCookies()">Accept &amp; continue</button>
      <button class="zh-cookie__decline" onclick="zhDeclineCookies()">Decline optional cookies</button>
    </div>
  </div>
</div>

<script>
  (function () {
    var STORAGE_KEY = 'zh-cookie-consent';

    function zhShowBanner() {
      if (!localStorage.getItem(STORAGE_KEY)) {
        var banner = document.getElementById('zh-cookie-banner');
        if (banner) {
          banner.classList.add('zh-cookie--visible');
          document.body.style.overflow = 'hidden';
        }
      }
    }

    function zhHideBanner() {
      var banner = document.getElementById('zh-cookie-banner');
      if (banner) {
        banner.classList.remove('zh-cookie--visible');
        document.body.style.overflow = '';
      }
    }

    window.zhAcceptCookies = function () {
      localStorage.setItem(STORAGE_KEY, 'accepted');
      zhHideBanner();
      var retries = 0;
      (function tryUpdate() {
        if (typeof gtag === 'function') {
          gtag('consent', 'update', {
            'analytics_storage': 'granted',
            'ad_storage': 'granted'
          });
        } else if (retries++ < 20) {
          setTimeout(tryUpdate, 100);
        }
      })();
    };

    window.zhDeclineCookies = function () {
      localStorage.setItem(STORAGE_KEY, 'declined');
      zhHideBanner();
      if (typeof gtag === 'function') {
        gtag('consent', 'update', {
          'analytics_storage': 'denied',
          'ad_storage': 'denied'
        });
      }
    };

    // Also restore consent on repeat visits
    if (localStorage.getItem(STORAGE_KEY) === 'accepted' && typeof gtag === 'function') {
      gtag('consent', 'update', { 'analytics_storage': 'granted', 'ad_storage': 'granted' });
    }

    document.addEventListener('DOMContentLoaded', zhShowBanner);
  })();
</script>
