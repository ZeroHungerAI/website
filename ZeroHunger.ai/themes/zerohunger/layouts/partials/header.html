<header class="zh-header" role="banner">
  <div class="zh-header__inner">
    <a class="zh-brand" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 52" role="img" aria-label="ZeroHunger.ai" width="180" height="32" style="display:block">
        <title>ZeroHunger.ai</title>
        <text x="0" y="40" class="zh-wm zh-wm-fg" style="fill:#fff;font-family:'Avenir Next','Avenir','Nunito Sans','Helvetica Neue',sans-serif;font-size:40px;font-weight:700;letter-spacing:-0.02em">ZeroHunger<tspan style="opacity:0.55">.ai</tspan></text>
      </svg>
    </a>

    <button class="zh-burger" id="zh-burger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="zh-nav">
      &#9776;
    </button>

    <nav class="zh-nav" id="zh-nav" role="navigation" aria-label="Main">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $currentPage.IsMenuCurrent "main" . }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

<script>
(function() {
  var btn = document.getElementById('zh-burger');
  var nav = document.getElementById('zh-nav');
  if (btn && nav) {
    btn.addEventListener('click', function() {
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  }
})();
</script>
